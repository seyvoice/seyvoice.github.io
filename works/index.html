<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sey Works</title>

    <style>
        :root {
            --panel-w: clamp(8%, calc(100% - 100vh), 480px);
        }

        h1 { font-size: clamp(40px, 12vw, 60px); text-shadow:0 0 20px rgba(25, 25, 25, 0.9), 0 0 40px rgba(25, 25, 25, 0.5);}/* text-shadow: x-offset y-offset blur-radius color; */
        p  { font-size: clamp(12px, 2.6vw, 18px); text-shadow:0 0 20px rgba(25, 25, 25, 0.9), 0 0 40px rgba(25, 25, 25, 0.5);}
        h2 { font-size: clamp(16px, 4.8vw, 24px); display: inline-block; text-align:right; text-shadow:0 0 20px rgba(25, 25, 25, 0.9), 0 0 40px rgba(25, 25, 25, 0.5);}
        .icon { width: clamp(16px, 4.8vw, 24px); clamp(16px, 4.8vw, 24px); box-shadow:0 0 20px rgba(25, 25, 25, 0.9), 0 0 40px rgba(25, 25, 25, 0.5); border-radius: 25%;}
        
        html, body {
            margin:0;
            padding:0;
            background:black;
            color:white;
            font-family:sans-serif;
            overflow:hidden;
        }

        .bg {
            position:fixed;
            width:100%;
            height:100%;
            background:url('bg.jpg') center/cover no-repeat;
            z-index:-1;
        }
            
        .center {
            position:fixed;
            left:50%;
            top:49%;
            transform:translate(-100%,-100%);
            text-align:right;
        }

        .buttons {
            position:fixed;
            left:50%;
            top:51%;
            transform:translate(-100%,0%);
            display: block;
            line-height: 1.5
        }
        
        .buttons a {
            margin:0;
            color:white;
            text-decoration:none;
            cursor:pointer;
        }

        .galleryPanel {
            position:fixed;
            top:0;
            left:-300px;
            width:220px;
            height:100%;
            background:rgba(0,0,0,0.8);
            padding:1px;
            transition:0.2s;
            overflow-y:auto;
            z-index:10;
        }
        .galleryPanel.active { left:0; }

        @media (max-width: 120vh), (orientation: portrait)
        {
            .galleryPanel {
                left:-120%;
                width:100%;
                z-index:1;
            }
        }
        
        .close-btn {
            margin-bottom:10px;
            cursor:pointer;
            opacity:0.7;
        }

        .grid {
            display:grid;
            grid-template-columns:repeat(1,1fr);
            gap:1px;
        }
        @media (max-width: 120vh), (orientation: portrait) {
            .grid {
                grid-template-columns:repeat(10,1fr);
            }
        }
        @media (max-width: calc(100vh + 320px)) and (orientation: portrait)
        {
            .grid {
                grid-template-columns:repeat(5,1fr);
            }
        }
        .grid-item {
            width: 100%;
            aspect-ratio: 16 / 9;
            position: relative;
            cursor:pointer;
        }
        .grid-item img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: contain;
            position: center;
        }
        
        .viewer {
            position: fixed;
            left: calc(220px + 2px);
            top: 0;
            width: calc(100% - 220px - 2px);
            height: 100vh;
            
            display: none;
            align-items: center;
            justify-content: center;
            
            background-color: rgba(0, 0, 0, 0.9);
            
            z-index:20;
            pointer-events:auto;
            cursor:pointer;
        }
        @media (max-width: 120vh), (orientation: portrait) {
            .viewer {
                left: 0;
                top: calc(10% + 24px);
                width: 100%;
            }
        }

        .viewer img {
            position: relative;
            width: min(100%, 100vh);
            aspect-ratio: 16 / 9;
            object-fit: contain;
            pointer-events:auto;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="bg"></div>

<div class="center">
    <h1>Sey</h1>
    <p>Musician & Artist & Writer</p>
</div>

<div class="buttons">
    <h2><a href="https://store.steampowered.com/app/4637040/Unwritten_Saga_The_Circle/" target="_blank"><img src="icon_steam.png" class="icon"> project silence</a><br>
    <a href="https://zioelettro.itch.io/autonoesis" target="_blank"><img src="icon_itchio.png" class="icon"> AutonoesiS</a><br>
    <a onclick="toggleGallery()">prev works</a><br>
    <a href="https://seyvoice.github.io" target="_blank">about Sey</a></h2>
</div>

<!-- 갤러리 -->
<div id="gallery" class="galleryPanel">
    <div class="close-btn" onclick="closePanels()">[ X ]</div>
    <div class="grid">
        <div class="grid-item"><img src="Chr_Outlaw.png" onclick="view(event, this.src)"></div>
        <div class="grid-item"><img src="Boss_5.png" onclick="view(event, this.src)"></div>
        <div class="grid-item"><img src="Boss_1.png" onclick="view(event, this.src)"></div>
        <div class="grid-item"><img src="Boss_3.png" onclick="view(event, this.src)"></div>
        <div class="grid-item"><img src="MiniBoss_1.png" onclick="view(event, this.src)"></div>
        <div class="grid-item"><img src="MiniBoss_3.png" onclick="view(event, this.src)"></div>
        <div class="grid-item"><img src="Map_02.png" onclick="view(event, this.src)"></div>
        <div class="grid-item"><img src="Map_03.png" onclick="view(event, this.src)"></div>
        <div class="grid-item"><img src="Map_05.png" onclick="view(event, this.src)"></div>
        <div class="grid-item"><img src="Map_06.png" onclick="view(event, this.src)"></div>
        
    </div>
    </div>
</div>

<div id="viewerArea" class="viewer">
    <img id="viewerCanvas">
</div>

<script>
    function toggleGallery(){
        document.getElementById('gallery').classList.toggle('active');
        document.getElementById('music').classList.remove('active');
    }

    function closePanels(){
        closeViewer();
        document.getElementById('gallery').classList.remove('active');
        document.getElementById('music').classList.remove('active');
    }

    function view(e, src){
        e.stopPropagation(); // 이거 핵심
        document.getElementById('viewerCanvas').src = src;
        document.getElementById('viewerArea').style.display = 'flex';
    }

    function closeViewer(){
        document.getElementById('viewerArea').style.display = 'none';
    }

    document.getElementById('viewerArea').onclick = function(){
        closeViewer();
    };
</script>

</body>
</html>
