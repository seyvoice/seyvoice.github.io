<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SE Wiki Portal</title>
    <style>
        body {
            max-width: 800px;
            margin: 100px auto;
            padding: 0 20px;
            background-color: #101014;
            color: #eeeeee;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            text-align: center;
        }
        h1 { font-size: 2.5em; margin-bottom: 50px; color: #08c8c8; }
        .portal-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .portal-card {
            padding: 30px;
            border: 1px solid #333;
            border-radius: 12px;
            text-decoration: none;
            color: #9F9Fa4;
            transition: all 0.3s;
            background: #16161a;
        }
        .portal-card:hover {
            border-color: #08c8c8;
            transform: translateY(-5px);
            background: #1c1c21;
            color: #eeeeee;
        }
        .portal-card h2 { margin: 0 0 10px 0; font-size: 1.5em; }
        .portal-card p { margin: 0; font-size: 0.9em; opacity: 0.7; }
    </style>
</head>
<body>
<h1>SE Wiki</h1>
<div class="portal-container">
    <!-- 프로젝트 사일런스 위키 -->
    <a href="./ProjectSilenceWiki/wiki.html" class="portal-card">
        <h2>🤫 Project Silence Wiki</h2>
        <p>프로젝트 사일런스 개발 기록 및 위키</p>
    </a>
    <!-- 개인 위키 -->
    <a href="./SeyWiki/wiki.html" class="portal-card">
        <h2>👤 Sey Wiki</h2>
        <p>개인적인 생각과 아카이빙</p>
    </a>
</div>
</body>
</html>
