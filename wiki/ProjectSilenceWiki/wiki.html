<script>
	let currentPath = "";

	// ✅ 절대경로 기반 resolve
	function resolvePath(href) {
		if (!href || href.startsWith("http") || href.startsWith("#")) return href;

		const base = new URL(currentPath, window.location.origin);
		const resolved = new URL(href, base).pathname;

		return resolved;
	}

	// ✅ 링크 이벤트
	function attachLinkEvents() {
		document.querySelectorAll("#markdown-content a").forEach(link => {
			link.onclick = function (e) {
				const href = this.getAttribute("href");
				if (!href || href.startsWith("http") || href.startsWith("#")) return;

				e.preventDefault();
				loadMarkdown(resolvePath(href));
			};
		});
	}

	// ✅ 핵심 로딩 함수 (완전 정리)
	async function loadMarkdown(path, isBackAction = false) {
		try {
			let target = path.replace(/^#/, "");

			// 1️⃣ 기본 진입
			if (!target || target === "/") {
				target = "/wiki/ProjectSilenceWiki/README.md";
			}

			// 2️⃣ 절대경로 강제
			if (!target.startsWith("/")) {
				target = "/" + target;
			}

			// 3️⃣ 폴더 → README.md
			let fetchUrl = target;
			if (!target.toLowerCase().endsWith(".md") && !target.toLowerCase().endsWith(".html")) {
				fetchUrl = target.endsWith("/")
						? target + "README.md"
						: target + "/README.md";
			}

			// ⭐ currentPath는 fetch 기준으로 저장 (중요)
			currentPath = fetchUrl;

			console.log("FETCH:", fetchUrl);

			const response = await fetch(fetchUrl);
			if (!response.ok) throw new Error(`Load failed: ${fetchUrl}`);

			const markdownText = await response.text();
			document.getElementById("markdown-content").innerHTML =
					marked.parse(markdownText);

			if (!isBackAction) {
				history.pushState({ path: target }, "", "#" + target);
			}

			updateUI(fetchUrl);
			attachLinkEvents();
			window.scrollTo(0, 0);

		} catch (error) {
			console.error(error);
			document.getElementById("markdown-content").innerHTML =
					`<p style="color:red;">오류: Load failed<br><small>${path}</small></p>`;
		}
	}

	// UI
	function updateUI(path) {
		const isHome = path.toLowerCase().includes("readme.md");
		document.getElementById("back-button").style.display = isHome ? "none" : "flex";
	}

	// 새로고침
	function refreshContent() {
		const current = window.location.hash.substring(1);
		loadMarkdown(current || "/wiki/ProjectSilenceWiki/README.md", true);
	}

	// 뒤로가기
	window.onpopstate = (e) => {
		const path = (e.state && e.state.path)
				? e.state.path
				: "/wiki/ProjectSilenceWiki/README.md";

		loadMarkdown(path, true);
	};

	// 최초 실행
	window.addEventListener("DOMContentLoaded", () => {
		const start = window.location.hash.substring(1);

		if (!start) {
			loadMarkdown("/wiki/ProjectSilenceWiki/README.md");
		} else {
			loadMarkdown(start);
		}
	});
</script>
