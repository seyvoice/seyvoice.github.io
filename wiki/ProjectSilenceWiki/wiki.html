<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>SE Wiki</title>
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<style>
		h1, h2, h3 { color: #eeeeee; }
		body {
			max-width: 900px; margin: 40px auto; padding: 0 20px;
			line-height: 1.7; color: #9F9Fa4; background-color:#101014;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
		}
		td, th { padding: 4px 8px; }
		#markdown-content img { max-width: 100%; height: auto; border-radius: 8px; }
		#markdown-content code { padding: 0.2em 0.4em; border-radius: 6px; font-family: monospace; }
		#markdown-content blockquote { border-left: 4px solid #8F8F94; color: #8F8F94; margin: 0; padding-left: 1em; }
		a { color: #08c8c8; text-decoration: none; }
		a:hover { text-decoration: underline; }

		@keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
		.btn {
			transition: all 0.2s; width: 30px; height: 30px;
			display: flex; align-items: center; justify-content: center;
			border-radius: 50%; font-size: 16px; cursor: pointer;
			color: #101014; background-color: #eeeeee !important;
			box-shadow: 0px 0px 6px rgba(255, 255, 255, 0.1) !important;
			border: 0; position: absolute; left: -40px;
		}
		.btn:hover { box-shadow: 0px 0px 6px rgba(255, 255, 255, 0.5) !important; }
		.btn:active { animation: blink 0.3s linear; }
		@media (max-width: 1000px) { .btn { left: 10px; top: 10px; } }
	</style>
</head>
<body>
<div id="wiki-wrapper" style="position: relative; max-width: 900px; margin: 40px auto; padding: 0 20px;">
	<button id="back-button" class="btn" onclick="history.back()" style="display: none; top: 10px;">←</button>
	<button id="refresh-button" class="btn" onclick="refreshContent()" title="새로고침" style="top: 60px;">↻</button>
	<div id="markdown-content"></div>

	<script>
		let currentPath = '';
		
		// [수정] 상위 폴더 강제 결합 제거, 순수 상대 경로 유지
		function resolvePath(href) {
			if (!href || href.startsWith('http') || href.startsWith('#')) return href;

			const base = new URL(currentPath, window.location.origin + window.location.pathname);
			return new URL(href, base).pathname.replace(/^\//, '');
		}

		// 현재 경로 기준
		function getBaseDir(path) {
			const idx = path.lastIndexOf('/');
			return idx === -1 ? '' : path.substring(0, idx + 1);
		}

		function attachLinkEvents(currentPath) {
			document.querySelectorAll('#markdown-content a').forEach(link => {
				link.onclick = function(e) {
					const href = this.getAttribute('href');
					if (!href || href.startsWith('http') || href.startsWith('#')) return;

					e.preventDefault();
					const resolved = resolvePath(href, currentPath);
					loadMarkdown(resolved);
				};
			});
		}

		async function loadMarkdown(path, isBackAction = false) {
			currentPath = path; // ⭐ 핵심
			try {
				let target = path.replace(/^#/, '');
				if (!target || target === '/') target = 'README.md';

				// [수정] 폴더마다 README.md가 있으므로, 확장자가 없는 경로는 README.md로 연결
				let fetchUrl = target;
				if (!target.toLowerCase().endsWith('.md') && !target.toLowerCase().endsWith('.html')) {
					fetchUrl = target.endsWith('/') ? target + 'README.md' : target + '/README.md';
				}

				const response = await fetch(fetchUrl);
				if (!response.ok) throw new Error(`Load failed: ${fetchUrl}`);

				const buffer = await response.arrayBuffer();
				const markdownText = new TextDecoder('utf-8').decode(buffer);
				document.getElementById('markdown-content').innerHTML = marked.parse(markdownText);

				if (!isBackAction) history.pushState({ path: target }, '', '#' + target);

				updateUI(target);
				attachLinkEvents(target);
				window.scrollTo(0, 0);
			} catch (error) {
				console.error(error);
				document.getElementById('markdown-content').innerHTML =
						`<p style="color:red;">오류: Load failed<br><small>시도 경로: ${path}</small></p>`;
			}
		}

		function updateUI(path) {
			const isHome = path.toLowerCase().includes('README.md');
			document.getElementById('back-button').style.display = isHome ? 'none' : 'flex';
			document.getElementById('refresh-button').style.display = 'flex';
		}

		function refreshContent() {
			const current = window.location.hash.substring(1) || 'README.md';
			loadMarkdown(current, true);
		}

		window.onpopstate = (e) => {
			const path = (e.state && e.state.path) ? e.state.path : 'README.md';
			loadMarkdown(path, true);
		};

		// 초기 구동
		window.addEventListener('DOMContentLoaded', () => {
			const start = window.location.hash.substring(1) || 'README.md';
			loadMarkdown(start);
		});
	</script>
</div>
</body>
</html>
