<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>SE Wiki</title>
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<style>
		/*[cite: 1, 3] 소스 스타일 및 버튼 디자인 복구 */
		h1, h2, h3 { color: #eeeeee; }
		body {
			max-width: 900px;
			margin: 40px auto;
			padding: 0 20px;
			line-height: 1.7;
			color: #9F9Fa4;
			background-color:#101014;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
		}
		#markdown-content img { max-width: 100%; height: auto; border-radius: 8px; }
		a { color: #08c8c8; text-decoration: none; }
		a:hover { text-decoration: underline; }

		@keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
		.btn {
			transition: all 0.2s;
			width: 30px; height: 30px;
			display: flex; align-items: center; justify-content: center;
			border-radius: 50%; font-size: 16px; cursor: pointer;
			color: #101014; background-color: #eeeeee !important;
			box-shadow: 0px 0px 6px rgba(255, 255, 255, 0.1) !important;
			border: 0; position: absolute; left: -35px;
		}
		.btn:hover { box-shadow: 0px 0px 6px rgba(255, 255, 255, 0.5) !important; }
		.btn:active { animation: blink 0.3s linear; }
		@media (max-width: 1000px) { .btn { left: 10px; top: 10px; } }
	</style>
</head>
<body>
<div id="wiki-wrapper" style="position: relative; max-width: 900px; margin: 40px auto; padding: 0 20px;">
	<button id="back-button" class="btn" onclick="history.back()" style="display: none; top: 10px;">←</button>
	<button id="refresh-button" class="btn" onclick="refreshContent()" title="새로고침" style="top: 60px;">↻</button>

	<div id="markdown-content"></div>

	<script>
		// [핵심] 깃허브 페이지스에서 index.html이 위치한 절대 경로를 파악합니다.
		const siteRoot = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);

		// 1. 경로 해결 함수: 모든 경로를 siteRoot 기반의 절대 경로로 변환
		function getFullPath(targetPath) {
			if (targetPath.startsWith('http')) return targetPath;

			// 해시(#)로 시작하는 경로 처리
			let clean = targetPath.replace(/^#/, '');

			// 상대 경로(./) 처리 및 절대 URL 생성
			const url = new URL(clean, siteRoot);
			let finalPath = url.pathname;

			// 확장자가 없으면 README.md 추가 (폴더 접근 대응)
			if (!finalPath.toLowerCase().endsWith('.md') && !finalPath.toLowerCase().endsWith('.html')) {
				finalPath = finalPath.endsWith('/') ? finalPath + 'README.md' : finalPath + '/README.md';
			}

			return finalPath.replace(/\/+/g, '/');
		}

		// 2. 마크다운 로드 함수
		async function loadMarkdown(path, isBackAction = false) {
			try {
				const fetchPath = getFullPath(path);
				console.log("🔍 TARS Fetching:", fetchPath);

				const response = await fetch(fetchPath);
				if (!response.ok) throw new Error(`HTTP ${response.status}: 파일을 찾을 수 없습니다.`);

				const text = await response.text();
				document.getElementById('markdown-content').innerHTML = marked.parse(text);

				// 주소창 해시 업데이트
				if (!isBackAction) {
					const hashPath = fetchPath.replace(window.location.pathname, '');
					history.pushState({ path: hashPath }, '', '#' + hashPath);
				}

				updateUI(path);
				attachLinkEvents();
				window.scrollTo(0, 0);
			} catch (error) {
				console.error(error);
				document.getElementById('markdown-content').innerHTML =
						`<p style="color:red;">오류: Load failed<br><small>시도한 경로: ${path}</small><br><br>
                        <b>TARS 체크리스트:</b><br>
                        1. 파일명의 대소문자가 정확한가요? (Home.md vs home.md)<br>
                        2. 깃허브에 푸시 후 1~2분이 지났나요?</p>`;
			}
		}

		// 3. 링크 이벤트 바인딩
		function attachLinkEvents() {
			const links = document.querySelectorAll('#markdown-content a');
			links.forEach(link => {
				link.onclick = function(e) {
					const href = this.getAttribute('href');
					if (!href || href.startsWith('http') || href.startsWith('#')) return;
					e.preventDefault();
					loadMarkdown(href);
				};
			});
		}

		function updateUI(path) {
			const isHome = path.toLowerCase().includes('home.md');
			document.getElementById('back-button').style.display = isHome ? 'none' : 'flex';
		}

		function refreshContent() {
			const current = window.location.hash.substring(1) || 'Home.md';
			loadMarkdown(current, true);
		}

		window.onpopstate = (e) => {
			if (e.state && e.state.path) loadMarkdown(e.state.path, true);
		};

		// 초기 실행
		window.addEventListener('DOMContentLoaded', () => {
			const start = window.location.hash.substring(1) || 'Home.md';
			loadMarkdown(start);
		});
	</script>
</div>
</body>
</html>
