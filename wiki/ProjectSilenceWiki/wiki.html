<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Project Silence Wiki</title>
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<style>
		/* 기존의 세련된 다크 모드 스타일[cite: 1, 3] */
		h1, h2, h3 { color: #eeeeee; }
		body {
			max-width: 900px;
			margin: 40px auto;
			padding: 0 20px;
			line-height: 1.7;
			color: #9F9Fa4;
			background-color:#101014;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
		}
		#markdown-content img { max-width: 100%; height: auto; border-radius: 8px; }
		#markdown-content blockquote { border-left: 4px solid #8F8F94; color: #8F8F94; margin: 0; padding-left: 1em; }
		a { color: #08c8c8; text-decoration: none; }
		a:hover { text-decoration: underline; }

		@keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
		.btn {
			transition: all 0.2s; width: 30px; height: 30px; display: flex;
			align-items: center; justify-content: center; border-radius: 50%;
			cursor: pointer; color: #000; background-color: #fff !important;
			box-shadow: 0px 0px 6px rgba(255, 255, 255, 0.2); border: 0;
			position: absolute; left: -35px;
		}
		.btn:active { animation: blink 0.3s linear; }
	</style>
</head>
<body>
<div id="wiki-wrapper" style="position: relative; max-width: 900px; margin: 40px auto; padding: 0 20px;">
	<!-- 포털로 돌아가는 버튼 추가 -->
	<button onclick="location.href='../index.html'" class="btn" title="포털로 이동" style="top: -30px;">🏠</button>
	<button id="back-button" class="btn" onclick="history.back()" style="display: none; top: 20px;">←</button>
	<button id="refresh-button" class="btn" onclick="refreshContent()" title="새로고침" style="top: 60px;">↻</button>

	<div id="markdown-content"></div>

	<script>
		// 전용 위키 파일이 폴더 안에 있으므로 경로가 매우 단순함
		async function loadMarkdown(path, isBackAction = false) {
			try {
				const cleanPath = path.replace(/^#/, '') || 'README.md'; // 기본값 README.md[cite: 1]

				// 같은 폴더 내의 파일을 직접 fetch
				const response = await fetch(cleanPath);
				if (!response.ok) throw new Error(`파일 없음: ${cleanPath}`);

				const text = await response.text();
				document.getElementById('markdown-content').innerHTML = marked.parse(text);

				if (!isBackAction) {
					history.pushState({ path: cleanPath }, '', '#' + cleanPath);
				}

				// UI 업데이트
				document.getElementById('back-button').style.display =
						(cleanPath.toLowerCase().includes('readme.md')) ? 'none' : 'flex';

				attachLinkEvents();
				window.scrollTo(0, 0);
			} catch (error) {
				document.getElementById('markdown-content').innerHTML =
						`<p style="color:red;">오력: ${error.message}</p>`;
			}
		}

		function attachLinkEvents() {
			const links = document.querySelectorAll('#markdown-content a');
			links.forEach(link => {
				link.onclick = function(e) {
					const href = this.getAttribute('href');
					if (!href || href.startsWith('http') || href.startsWith('#')) return;
					e.preventDefault();
					loadMarkdown(href);
				};
			});
		}

		async function refreshContent() {
			const current = window.location.hash.substring(1) || 'README.md';
			await loadMarkdown(current, true);
		}

		window.onpopstate = (e) => { if (e.state) loadMarkdown(e.state.path, true); };
		window.onload = () => { loadMarkdown(window.location.hash.substring(1)); };
	</script>
</div>
</body>
</html>
