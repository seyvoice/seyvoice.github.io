<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <style>
        html, body {
            margin:0;
            padding:0;
            background:black;
            color:white;
            font-family:sans-serif;
            overflow:hidden;
        }

        /* 배경 */
        .bg {
            position:fixed;
            width:100%;
            height:100%;
            background:url('images/bg.jpg') center/cover no-repeat;
            z-index:-1;
        }

        /* 중앙 텍스트 */
        .center {
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            text-align:center;
        }

        h1 { font-size:48px; margin:0; }
        p { margin:10px 0 20px; opacity:0.8; }

        /* 버튼 */
        .buttons a {
            margin:5px;
            padding:10px 20px;
            border:1px solid white;
            color:white;
            text-decoration:none;
            cursor:pointer;
        }
        .buttons a:hover {
            background:white;
            color:black;
        }

        /* 패널 */
        .panel {
            position:fixed;
            top:0;
            left:-320px;
            width:320px;
            height:100%;
            background:rgba(0,0,0,0.85);
            padding:20px;
            transition:0.3s;
            overflow-y:auto;
        }
        .panel.active { left:0; }

        /* 갤러리 */
        .grid {
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:8px;
        }
        .grid img {
            width:100%;
            cursor:pointer;
        }

        /* 확대뷰 */
        .viewer {
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            display:none;
        }
        .viewer img {
            max-width:80vw;
            max-height:80vh;
        }

        /* 음악 */
        .track {
            cursor:pointer;
            padding:6px 0;
            border-bottom:1px solid #444;
        }
        audio {
            width:100%;
            margin-top:10px;
        }
    </style>
</head>

<body>

<div class="bg"></div>

<div class="center">
    <h1>YOUR NAME</h1>
    <p>Singer-Songwriter & Composer</p>

    <div class="buttons">
        <a onclick="toggleGallery()">Gallery</a>
        <a onclick="toggleMusic()">Music</a>
        <a href="https://instagram.com/yourlink" target="_blank">Instagram</a>
    </div>
</div>

<!-- 갤러리 -->
<div id="gallery" class="panel">
    <h3>Gallery</h3>
    <div class="grid">
        <img src="images/gallery1.jpg" onclick="view(this.src)">
        <img src="images/gallery2.jpg" onclick="view(this.src)">
        <img src="images/gallery3.jpg" onclick="view(this.src)">
        <img src="images/gallery4.jpg" onclick="view(this.src)">
        <img src="images/gallery5.jpg" onclick="view(this.src)">
        <img src="images/gallery6.jpg" onclick="view(this.src)">
        <img src="images/gallery7.jpg" onclick="view(this.src)">
        <img src="images/gallery8.jpg" onclick="view(this.src)">
        <img src="images/gallery9.jpg" onclick="view(this.src)">
    </div>
</div>

<div id="viewer" class="viewer" onclick="this.style.display='none'">
    <img id="big">
</div>

<!-- 음악 -->
<div id="music" class="panel">
    <h3>Music</h3>
    <div class="track" onclick="play('music/2022_Personal_FilmRework_TENET.mp3')">Track 1</div>
    <div class="track" onclick="play('music/2022_Personal_FilmRework_TheBourneUltimatum.mp3')">Track 1</div>
    <div class="track" onclick="play('music/2022_Personal_FanWork_Persona.mp3')">Track 1</div>
    <div class="track" onclick="play('music/2022_DarkFantasy_Witchcraft.mp3')">Track 1</div>
    <div class="track" onclick="play('music/2019_MiniRPG_Cemetry.mp3')">Track 1</div>
    <div class="track" onclick="play('music/2019_MiniRPG_Sewer.mp3')">Track 1</div>
    <div class="track" onclick="play('music/2018_MiniGame_Polygons.mp3')">Track 1</div>
    <div class="track" onclick="play('music/2018_SuperPixelRacers_FuriousFight.mp3')">Track 1</div>
    <div class="track" onclick="play('music/2018_SuperPixelRacers_ChasingTime.mp3')">Track 1</div>
    <div class="track" onclick="play('music/2018_SuperPixelRacers_ProdigyClub.mp3')">Track 1</div>
    <div class="track" onclick="play('music/2018_SuperPixelRacers_DefiniteWinner.mp3')">Track 1</div>
    <audio id="player" controls></audio>
</div>

<script>
    function toggleGallery(){
        document.getElementById('gallery').classList.toggle('active');
        document.getElementById('music').classList.remove('active');
    }

    function toggleMusic(){
        document.getElementById('music').classList.toggle('active');
        document.getElementById('gallery').classList.remove('active');
    }

    function view(src){
        document.getElementById('big').src = src;
        document.getElementById('viewer').style.display = 'block';
    }

    function play(src){
        const p = document.getElementById('player');
        p.src = src;
        p.play();
    }
</script>

</body>
</html>
